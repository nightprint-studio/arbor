<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Backdrop: charcoal → near-black with a subtle vertical fall-off -->
    <linearGradient id="vx-bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#27262b"/>
      <stop offset="55%"  stop-color="#161519"/>
      <stop offset="100%" stop-color="#0a090c"/>
    </linearGradient>

    <!-- Top-rim bevel highlight -->
    <linearGradient id="vx-bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- V mark: amber → deep orange so it pops against the dark backdrop -->
    <linearGradient id="vx-mark" x1="256" y1="100" x2="256" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <!-- Soft drop shadow under the mark for depth -->
    <filter id="vx-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backdrop + inner stroke + top bevel -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#vx-bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" ry="106"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <rect x="0" y="0" width="512" height="240" rx="112" ry="112" fill="url(#vx-bevel)"/>

  <!-- "V" chevron: outer wedge with an inner cutout shapes a stroked V. -->
  <g filter="url(#vx-shadow)">
    <path d="M 132 100 L 256 404 L 380 100 L 320 100 L 256 256 L 192 100 Z"
          fill="url(#vx-mark)"/>
  </g>

  <!-- Apex dot: cream core ringed by deep orange. -->
  <circle cx="256" cy="404" r="22" fill="#fde68a" stroke="#7c2d12" stroke-width="6"/>
</svg>
